<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Leak Hub">
<meta name="theme-color" content="#faf9f7">
<title>Leak Hub</title>
<link rel="icon" type="image/png" href="appicon-dark-1024.png">
<link rel="apple-touch-icon" href="appicon-dark-1024.png">
<link rel="apple-touch-icon" sizes="1024x1024" href="appicon-dark-1024.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#101418; --paper:#faf9f7; --white:#ffffff;
    --brand:#6D28D9; --brand-dark:#5B21B6; --brand-light:#EDE9FE;
    --leak:#c2410c; --leak-light:#fff1ea;
    --gray-400:#9aa0a8; --gray-500:#6b7280; --gray-600:#4b5563;
    --line:rgba(16,20,24,.08);
    --card-sh:0 1px 2px rgb(16 20 24 / .04), 0 4px 16px rgb(16 20 24 / .05);
    --lift-sh:0 2px 4px rgb(16 20 24 / .05), 0 12px 32px rgb(16 20 24 / .09);
    --btn-sh:0 1px 2px rgb(91 33 182 / .35), 0 4px 12px rgb(91 33 182 / .25);
    --r:16px; --r-lg:20px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{background:var(--paper);color:var(--ink);font-family:"Plus Jakarta Sans",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
  .tabular{font-variant-numeric:tabular-nums}
  ::selection{background:var(--brand-light);color:var(--brand-dark)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#e3e0dc;border-radius:8px}

  .app{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
  .side{background:var(--white);border-right:1px solid var(--line);padding:22px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column}
  .brand{display:flex;align-items:center;gap:11px;padding:2px 8px 22px}
  .mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--brand),var(--brand-dark));display:grid;place-items:center;color:#fff;font-weight:800;font-size:18px;box-shadow:var(--btn-sh)}
  .brand .wm{font-size:17px;font-weight:800;letter-spacing:-.3px;line-height:1}
  .brand .tag{font-size:11px;color:var(--gray-400);font-weight:600}
  .navgroup{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--gray-400);padding:14px 10px 6px}
  .nav{display:flex;flex-direction:column;gap:2px}
  .nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:transparent;border:0;color:var(--gray-600);padding:9px 11px;border-radius:11px;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;transition:.15s}
  .nav button:hover{background:var(--paper);color:var(--ink)}
  .nav button.active{background:var(--brand-light);color:var(--brand-dark)}
  .nav button .ic{width:18px;text-align:center;font-size:15px;opacity:.9}
  .nav button.soon{color:var(--gray-400)}
  .nav button.soon:hover{background:var(--paper);color:var(--gray-600)}
  .nav button.soon .badge{margin-left:auto;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--gray-400);background:var(--paper);border:1px solid var(--line);padding:1px 6px;border-radius:20px}
  .side-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--line);font-size:11.5px;color:var(--gray-400)}
  .side-foot a{color:var(--gray-500);cursor:pointer;text-decoration:none;font-weight:600}
  .side-foot a:hover{color:var(--brand)}
  .sync{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;background:var(--paper);margin-bottom:10px;font-size:12px;font-weight:600;color:var(--gray-600)}
  .sync .d{width:8px;height:8px;border-radius:50%;background:var(--gray-400);flex:0 0 auto}
  .sync.ok .d{background:#22c55e}.sync.saving .d{background:#f59e0b;animation:pulse 1s infinite}.sync.off .d{background:#ef4444}.sync.local .d{background:var(--gray-400)}
  @keyframes pulse{50%{opacity:.35}}
  .sync .who{font-size:10.5px;color:var(--gray-400);font-weight:600;margin-top:1px}

  .main{padding:0 0 80px}
  .hero{background:linear-gradient(135deg,rgba(237,233,254,.55),var(--paper) 70%);padding:38px 44px 30px;border-bottom:1px solid var(--line)}
  .kicker{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--brand)}
  .hero h1{margin:8px 0 6px;font-size:30px;font-weight:800;letter-spacing:-.6px}
  .hero p{margin:0;color:var(--gray-600);font-size:15px;max-width:640px}
  .body{padding:26px 44px;max-width:900px}
  @media(max-width:860px){.app{grid-template-columns:1fr}.side{position:static;height:auto}.hero,.body{padding-left:22px;padding-right:22px}}

  .card{background:var(--white);border-radius:var(--r-lg);padding:22px 24px;box-shadow:var(--card-sh);margin-bottom:18px;transition:box-shadow .2s}
  .card:focus-within{box-shadow:var(--lift-sh)}
  .card h3{margin:0 0 3px;font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
  .card h3 .dot{width:7px;height:7px;border-radius:50%;background:var(--leak)}
  .card .hint{color:var(--gray-500);font-size:13px;margin:0 0 14px}
  label.fl{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--gray-400);margin:0 0 6px;font-weight:700}
  input[type=text],input[type=email],input[type=password],textarea{width:100%;background:var(--white);border:1px solid var(--line);border-radius:12px;color:var(--ink);padding:11px 13px;font-size:14.5px;font-family:inherit;transition:.15s;resize:vertical;box-shadow:inset 0 1px 2px rgb(16 20 24 / .03)}
  input:focus,textarea:focus{outline:none;border-color:rgba(109,40,217,.4);box-shadow:0 0 0 4px rgba(109,40,217,.1)}
  textarea{min-height:86px;line-height:1.6}
  .field{margin-bottom:15px}.field:last-child{margin-bottom:0}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  @media(max-width:720px){.grid2,.grid3{grid-template-columns:1fr}}
  .concept-wrap{background:linear-gradient(135deg,var(--brand-dark),var(--brand) 60%,#7c3aed);border-radius:var(--r-lg);padding:26px;box-shadow:var(--lift-sh);margin-bottom:22px}
  .concept-wrap .kicker{color:#d9cbff}
  .concept-wrap h3{color:#fff;margin:6px 0 12px;font-size:15px;font-weight:600;opacity:.85}
  .concept-input{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.22);border-radius:14px;color:#fff;font-size:20px;font-weight:700;line-height:1.4;padding:16px 18px;font-family:inherit;resize:vertical;min-height:78px}
  .concept-input:focus{outline:none;border-color:rgba(255,255,255,.55);box-shadow:0 0 0 4px rgba(255,255,255,.12)}
  .concept-input::placeholder{color:rgba(255,255,255,.55);font-weight:600}
  .goalcard{background:var(--white);border-radius:var(--r);padding:18px;box-shadow:var(--card-sh)}
  .goalcard .gh{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--brand);margin-bottom:2px}
  .goalcard .gs{font-size:11.5px;color:var(--gray-400);margin-bottom:12px}
  .goalcard textarea{min-height:120px;border:0;box-shadow:none;background:var(--paper);padding:12px}
  .soon-card{background:var(--white);border-radius:var(--r-lg);padding:40px;box-shadow:var(--card-sh);text-align:center}
  .soon-card .em{font-size:30px;margin-bottom:10px}
  .soon-card h3{justify-content:center;font-size:19px}
  .soon-card p{color:var(--gray-500);max-width:420px;margin:8px auto 0}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:0;border-radius:12px;padding:11px 18px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:.15s}
  .btn.primary{background:var(--brand);color:#fff;box-shadow:var(--btn-sh)}
  .btn.primary:hover{background:var(--brand-dark)}
  .btn.ghost{background:var(--white);color:var(--ink);box-shadow:var(--card-sh)}

  /* Auth overlay */
  .auth{position:fixed;inset:0;background:linear-gradient(135deg,#efeafc,var(--paper) 70%);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
  .auth.show{display:flex}
  .auth-card{background:var(--white);border-radius:24px;box-shadow:var(--lift-sh);padding:34px 32px;width:100%;max-width:380px;text-align:center}
  .auth-card .mark{margin:0 auto 16px;width:44px;height:44px;font-size:22px}
  .auth-card h2{margin:0 0 4px;font-size:22px;font-weight:800;letter-spacing:-.4px}
  .auth-card p{margin:0 0 20px;color:var(--gray-500);font-size:13.5px}
  .auth-card .field{text-align:left}
  .auth-err{color:#b91c1c;font-size:13px;font-weight:600;margin-top:12px;min-height:18px}
  .auth-card .btn{width:100%;margin-top:6px}

  .save-toast{position:fixed;bottom:22px;right:22px;background:var(--ink);color:#fff;padding:9px 16px;border-radius:11px;font-weight:600;font-size:13px;opacity:0;transform:translateY(10px);transition:.25s;pointer-events:none;z-index:99;box-shadow:var(--lift-sh)}
  .save-toast.show{opacity:1;transform:translateY(0)}
  .save-toast .d{display:inline-block;width:7px;height:7px;border-radius:50%;background:#4ade80;margin-right:7px}
</style>
</head>
<body>
<!-- ============================================================
     CONFIG — paste your SEPARATE Supabase project's values here.
     Until you do, the hub runs in local-only mode (this device).
     The anon key is safe to expose publicly; row-level security
     protects your data. See LEAK-HUB-SETUP.md.
============================================================ -->
<script>
  window.LEAK_CONFIG = {
    SUPABASE_URL:  "https://txutlljehcsgicfsylde.supabase.co",
    SUPABASE_ANON: "sb_publishable_i_tvcwmT45UzL_wL4XRvhg_Py-w-RJS"   // publishable key (safe to be public)
  };
</script>

<div class="app">
  <aside class="side">
    <div class="brand">
      <div class="mark">L</div>
      <div><div class="wm">Leak</div><div class="tag">business hub</div></div>
    </div>
    <div class="navgroup">Foundation</div>
    <nav class="nav" id="nav"></nav>
    <div class="side-foot">
      <div class="sync local" id="sync"><span class="d"></span><div><div id="syncTxt">Local only</div><div class="who" id="syncWho"></div></div></div>
      <a onclick="exportData()">Export backup</a> · <a onclick="importData()">Import</a><span id="signoutWrap"></span>
    </div>
  </aside>
  <main class="main" id="view"></main>
</div>

<!-- Login gate -->
<div class="auth" id="auth">
  <div class="auth-card">
    <div class="mark">L</div>
    <h2>Leak Hub</h2>
    <p>Sign in to sync across your devices.</p>
    <div class="field"><label class="fl">Email</label><input type="email" id="authEmail" autocomplete="username" placeholder="you@theserviceedit.com"></div>
    <div class="field"><label class="fl">Password</label><input type="password" id="authPass" autocomplete="current-password" placeholder="••••••••"></div>
    <button class="btn primary" id="authBtn" onclick="doLogin()">Sign in</button>
    <div class="auth-err" id="authErr"></div>
  </div>
</div>

<div class="save-toast" id="toast"><span class="d"></span>Saved</div>

<script>
const KEY='leak_hub_v1';
const uid=()=>Math.random().toString(36).slice(2,9);
const clone=o=>JSON.parse(JSON.stringify(o));
const SEED={view:'goals',concept:{oneliner:'',plain:'',problem:'',forIdeal:'',forNot:'',why:'',north:''},goals:{d30:'',d90:'',y1:''}};
let S=loadLocal();

/* ---------- local persistence (always on, offline cache) ---------- */
function loadLocal(){try{const r=localStorage.getItem(KEY);if(r)return Object.assign(clone(SEED),JSON.parse(r));}catch(e){}return clone(SEED);}
function saveLocal(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
let tt;function toast(msg){const el=document.getElementById('toast');el.innerHTML='<span class="d"></span>'+(msg||'Saved');el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),900);}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ---------- cloud sync (Supabase) ---------- */
let sb=null, session=null, cloudReady=false;
const cfg=window.LEAK_CONFIG||{};
const cloudConfigured = cfg.SUPABASE_URL && !cfg.SUPABASE_URL.includes('YOUR-') && cfg.SUPABASE_ANON && !cfg.SUPABASE_ANON.includes('YOUR-');

function setSync(state,txt,who){const el=document.getElementById('sync');if(!el)return;el.className='sync '+state;document.getElementById('syncTxt').textContent=txt;document.getElementById('syncWho').textContent=who||'';}

async function initCloud(){
  if(!cloudConfigured || !window.supabase){ setSync('local','Local only','This device'); return; }
  try{
    sb=window.supabase.createClient(cfg.SUPABASE_URL,cfg.SUPABASE_ANON);
    const {data}=await sb.auth.getSession();
    session=data.session;
    if(session){ await onSignedIn(); }
    else { showAuth(true); setSync('off','Signed out'); }
    sb.auth.onAuthStateChange((_e,s)=>{ session=s; if(s){showAuth(false);onSignedIn();} });
  }catch(e){ setSync('local','Local only','Cloud unreachable'); }
}
function showAuth(show){const a=document.getElementById('auth');a.classList.toggle('show',show);}

async function onSignedIn(){
  cloudReady=true;
  showAuth(false);
  const email=session.user.email||'';
  setSync('saving','Loading…',email);
  document.getElementById('signoutWrap').innerHTML=' · <a onclick="signOut()">Sign out</a>';
  try{
    const {data,error}=await sb.from('hub_state').select('data').eq('user_id',session.user.id).maybeSingle();
    if(error)throw error;
    if(data && data.data){ S=Object.assign(clone(SEED),data.data); saveLocal(); render(); }
    else { await pushCloud(); } // migrate current local data up on first sign-in
    setSync('ok','Synced',email);
  }catch(e){ setSync('off','Offline — local only',email); }
}

async function doLogin(){
  const email=document.getElementById('authEmail').value.trim();
  const pass=document.getElementById('authPass').value;
  const err=document.getElementById('authErr'), btn=document.getElementById('authBtn');
  err.textContent=''; btn.textContent='Signing in…'; btn.disabled=true;
  try{
    const {error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error)throw error;
  }catch(e){ err.textContent=e.message||'Could not sign in.'; }
  btn.textContent='Sign in'; btn.disabled=false;
}
async function signOut(){ if(sb){await sb.auth.signOut();} location.reload(); }

let ct;
function scheduleCloud(){
  if(!cloudReady)return;
  const email=session?session.user.email:'';
  setSync('saving','Saving…',email);
  clearTimeout(ct);
  ct=setTimeout(pushCloud,900);
}
async function pushCloud(){
  if(!cloudReady||!sb||!session)return;
  const email=session.user.email||'';
  try{
    const {error}=await sb.from('hub_state').upsert({user_id:session.user.id,data:S,updated_at:new Date().toISOString()});
    if(error)throw error;
    setSync('ok','Synced',email);
  }catch(e){ setSync('off','Offline — saved locally',email); }
}

/* one save() everywhere: local immediately, cloud debounced */
function save(){ saveLocal(); toast(); scheduleCloud(); }

/* ---------- nav + views ---------- */
const NAV=[
  {id:'goals',ic:'◎',label:'Goals & Concepts',live:true},
  {id:'offer',ic:'◈',label:'Offer & Pricing'},
  {id:'plan',ic:'▤',label:'Business Plan'},
  {id:'contacts',ic:'☎',label:'Contacts'},
  {id:'score',ic:'▲',label:'Scoreboard'}
];
function renderNav(){document.getElementById('nav').innerHTML=NAV.map(n=>`<button class="${n.live?(S.view===n.id?'active':''):'soon'}" onclick="go('${n.id}')"><span class="ic">${n.ic}</span>${n.label}${n.live?'':'<span class="badge">soon</span>'}</button>`).join('');}
function go(v){S.view=v;save();render();}
function render(){renderNav();const v=NAV.find(n=>n.id===S.view);document.getElementById('view').innerHTML=(v&&v.live)?vGoals():vSoon(v);}
function bind(path,val,ph,tall){const[a,b]=path.split('.');const on=`onchange="S.${a}.${b}=this.value;save()"`;return tall?`<textarea ${on} placeholder="${ph}">${esc(val)}</textarea>`:`<input type="text" ${on} value="${esc(val)}" placeholder="${ph}">`;}

function vGoals(){
  const c=S.concept,g=S.goals;
  return `
  <div class="hero"><div class="kicker">Foundation</div><h1>Goals &amp; Concepts</h1>
    <p>The bedrock. What Leak is, the problem it kills, who it’s for, and where you’re taking it. Everything else in this hub builds on what you decide here.</p></div>
  <div class="body">
    <div class="concept-wrap"><div class="kicker">The concept · one line</div>
      <h3>If someone asked “what’s Leak?” at a business conference — this is what you’d say.</h3>
      <textarea class="concept-input" onchange="S.concept.oneliner=this.value;save()" placeholder="Leak is … that helps … stop …">${esc(c.oneliner)}</textarea></div>
    <div class="card"><h3><span class="dot"></span>In plain words</h3><p class="hint">The slightly longer version — how you’d explain it to a café owner over coffee.</p>
      <div class="field">${bind('concept.plain',c.plain,'Leak looks at a venue’s numbers and shows the owner exactly where money is quietly leaking out — then helps them plug it.',true)}</div></div>
    <div class="card"><h3><span class="dot"></span>The problem I kill</h3><p class="hint">What painful, expensive thing does Leak make disappear? Why can’t owners see it themselves?</p>
      <div class="field">${bind('concept.problem',c.problem,'Cafés lose real money every week through waste, mispriced menus, over-ordering and labour — but it’s invisible in the day-to-day, so it never gets fixed.',true)}</div></div>
    <div class="card"><h3><span class="dot"></span>Who it’s for</h3><p class="hint">Get specific. The sharper the “who”, the easier every pitch, post and price becomes.</p>
      <div class="grid2"><div class="field"><label class="fl">Ideal client</label>${bind('concept.forIdeal',c.forIdeal,'Owner-operated cafés doing $X–$Y a week who feel busy but not profitable…',true)}</div>
      <div class="field"><label class="fl">Not for</label>${bind('concept.forNot',c.forNot,'Franchises, chains, hobby cafés with no real numbers…',true)}</div></div></div>
    <div class="card"><h3><span class="dot"></span>Why me — the unfair advantage</h3><p class="hint">What do you have that a spreadsheet or a generic consultant doesn’t?</p>
      <div class="field">${bind('concept.why',c.why,'Lived the hospitality grind, know the numbers cold, and Leak turns it into something owners actually act on.',true)}</div></div>
    <div class="card"><h3><span class="dot"></span>North star</h3><p class="hint">The one number that means Leak is working. Everything points at this.</p>
      <div class="field">${bind('concept.north',c.north,'e.g. paying subscribers · dollars saved for clients / month · MRR',false)}</div></div>
    <div class="card" style="background:linear-gradient(135deg,var(--leak-light),var(--white) 70%)"><h3><span class="dot"></span>Where it’s going</h3><p class="hint">Concrete targets across three horizons. Numbers you can point at, not vibes.</p>
      <div class="grid3">
        <div class="goalcard"><div class="gh">30 days</div><div class="gs">The sprint in front of you</div><textarea onchange="S.goals.d30=this.value;save()" placeholder="e.g. 5 audits, $5k AUD, 3 subscribers">${esc(g.d30)}</textarea></div>
        <div class="goalcard"><div class="gh">90 days</div><div class="gs">Proof it’s real</div><textarea onchange="S.goals.d90=this.value;save()" placeholder="e.g. 10 subscribers, $__ MRR, repeatable pitch">${esc(g.d90)}</textarea></div>
        <div class="goalcard"><div class="gh">12 months</div><div class="gs">The picture</div><textarea onchange="S.goals.y1=this.value;save()" placeholder="e.g. $__ MRR, working __ days/wk, the life this buys">${esc(g.y1)}</textarea></div>
      </div></div>
  </div>`;
}
function vSoon(n){return `<div class="hero"><div class="kicker">Next to build</div><h1>${n.label}</h1><p>We’re building this hub one page at a time so each one’s actually right. This section is next when you’re ready.</p></div>
  <div class="body"><div class="soon-card"><div class="em">🛠️</div><h3><span class="dot"></span>${n.label} — coming next</h3><p>Say the word and we’ll design this page together, in your Leak branding, just like Goals &amp; Concepts.</p></div></div>`;}

function exportData(){const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='leak-hub-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();}
function importData(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=e=>{const f=e.target.files[0];const r=new FileReader();r.onload=()=>{try{S=Object.assign(clone(SEED),JSON.parse(r.result));saveLocal();render();scheduleCloud();}catch(err){alert('Could not read that file.');}};r.readAsText(f);};inp.click();}

render();
initCloud();
</script>
</body>
</html>
